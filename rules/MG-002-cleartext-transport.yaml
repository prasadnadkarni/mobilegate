# MG-002 — Cleartext / accept-all transport
#
# Spec: mobile-security-release-gate-build-prompt-v2.1.md, "MG-002".
#
# Unlike MG-001, this is not a pattern-matching rule: there is no
# `patterns`/`exclusions`/`entropy` section, because there is nothing to
# regex-match. Every signal below is a structural check against parsed
# manifest and network_security_config.xml data — deterministic, not
# probabilistic — so the signal logic lives in Go
# (internal/engine/transport.go), not as data here. This file is rule
# metadata (severity, MASVS/CWE mapping, blocking status) plus the record
# of what's in and out of scope, same as MG-001's YAML documents its own
# scope decisions.
id: MG-002
name: Cleartext / accept-all transport
severity: critical
confidence: high
platform: android
blocking: true
masvs: MASVS-NETWORK-1
cwe: CWE-319
description: >
  The app permits cleartext (unencrypted HTTP) network traffic, either
  globally via the manifest or explicitly via
  network_security_config.xml, in a way that reaches a first-party
  domain (or, for a global <base-config> opt-in, unconditionally).
remediation: >
  Set android:usesCleartextTraffic="false" (the platform default on API
  28+; explicit is still clearer than relying on it), and ensure
  network_security_config.xml does not set
  cleartextTrafficPermitted="true" on any <base-config> or on a
  <domain-config> covering a first-party domain. If cleartext to a
  specific domain is a genuine product requirement (e.g. a self-hosted
  server whose address the user supplies, or Tor .onion routing where
  standard TLS/CA validation doesn't apply), suppress the specific
  finding in .mobilegate.yml with a documented reason — do not disable
  the rule, and do not remove the domain-config, since that is the
  actual security control working as configured.

# Signals (see CLAUDE.md multi-signal model). Four subtypes, reported as
# genuinely distinct findings (internal/engine's SignalManifestExplicit /
# SignalManifestImplicitLowSDK / SignalNSCDomainConfig /
# SignalNSCBaseConfig) — never collapsed into one, because each implies a
# different developer decision (or absence of one) and a different
# remediation:
#
#   1. manifest-explicit-cleartext: android:usesCleartextTraffic="true"
#      is present on <application>. A deliberate, app-wide opt-in.
#
#   2. manifest-implicit-cleartext-low-target-sdk:
#      android:usesCleartextTraffic is absent AND targetSdkVersion < 28.
#      Not a decision at all — it's the Android platform's own default
#      for apps that haven't moved past API 27. The finding is identical
#      in effect (cleartext is permitted) but the remediation is
#      different ("bump targetSdkVersion or add the attribute
#      explicitly" vs. "remove the attribute you deliberately added"),
#      so it must not be reported as the same thing as signal 1.
#      targetSdkVersion is recorded on every MG-002 finding (not just
#      this one) since it's relevant context regardless of which signal
#      fired — an app already on API 34 taking an explicit cleartext
#      opt-in reads differently than one on API 27 that never engaged
#      with the setting either way.
#
#   3. network-security-config-domain: a <domain-config
#      cleartextTrafficPermitted="true"> block whose <domain> entries
#      include at least one first-party domain (exact match, or a
#      subdomain when includeSubdomains="true" — see
#      internal/engine.firstPartyMatch). First-party domains come
#      exclusively from .mobilegate.yml's policy.first_party_domains
#      (internal/config) — never inferred (e.g. from the app's own
#      package name) — so with no config file, this signal structurally
#      cannot fire. Third-party SDK hosts (ad networks, analytics, a Tor
#      .onion domain, etc.) are never flagged, by construction: they're
#      simply not in the allowlist.
#
#   4. network-security-config-base: a <base-config
#      cleartextTrafficPermitted="true"> block. Unconditional — no domain
#      scoping exists at this level, so no first-party check applies; if
#      it's set, cleartext is permitted for everything not overridden by
#      a more specific <domain-config>. Originally scoped OUT of v1 (the
#      spec's "permits cleartext for first-party domains" language reads
#      as domain-scoped), reversed after MG-002 corpus batch 1: 4 of 6
#      real network_security_config files in a 10-app sample were
#      base-config-only, most plausibly because those apps
#      (self-hosted-server clients, arbitrary-feed readers) have a
#      genuine product need for user-supplied cleartext hosts — but an
#      unconditional cleartext allowance is strictly worse than a
#      domain-scoped one, so catching the narrow case while missing the
#      broad one would have been backwards. Detected honestly regardless
#      of whether it's "probably legitimate": this rule does not attempt
#      to infer legitimate use (see below) — that judgment belongs to a
#      human reviewer via suppression-with-justification, not to a
#      heuristic baked into the detector.
#
# Precedence: android:usesCleartextTraffic vs. network_security_config.
# These are NOT two independent signals that both apply — on API 24+
# (Android 7.0, when Network Security Configuration shipped), if the
# manifest references an NSC at all, the platform does not consult
# android:usesCleartextTraffic; the NSC alone determines the effective
# policy. internal/engine.TransportScanner.CheckManifest therefore
# returns nothing when an NSC is referenced and targetSdkVersion >= 24 —
# signals 1 and 2 above are suppressed, and only the NSC-derived signals
# (3 and 4) can fire for that app. Symmetrically,
# CheckNetworkSecurityConfig returns nothing when targetSdkVersion < 24:
# the platform never reads the NSC file at all below that line, so
# nothing in it is actually honored either. An unknown targetSdkVersion
# suppresses neither side (don't guess which one governs).
#
# This was a real bug, not a hypothetical: MG-002 corpus batch 1 (before
# this fix) reported both manifest-explicit-cleartext and
# network-security-config-base for the same 4 apps — noise, since only
# the NSC signal is real. Worse, the case the corpus didn't happen to
# contain — android:usesCleartextTraffic="true" with an NSC that
# explicitly denies cleartext — would have been a false positive on a
# correctly configured app: the manifest flag is inert there, the app
# does not actually permit cleartext, and firing on it anyway is exactly
# the failure mode this tool's whole precision bar exists to prevent.
# Fixtures: TestMG002_ManifestNSCPrecedence
# (internal/engine/mg002_fixtures_test.go).
#
# NOT implemented (v1 scope decision, same disposition as lib/*.so in
# MG-001): a custom TrustManager/HostnameVerifier that accepts all
# certificates/hosts. Spec lists this as MG-002's third signal, but
# detecting an accept-all *implementation* requires DEX method-body/
# bytecode analysis — this parser is deliberately string-pool-only
# (CLAUDE.md: "You do NOT need decompilation to Smali... do not let it
# grow into one"). A class referencing X509TrustManager or
# HostnameVerifier in its type/interface list is NOT evidence of an
# accept-all implementation — legitimate TrustManager implementations are
# common, including ones the platform itself provides — and there is no
# string-pool-only way to distinguish "checkServerTrusted with an empty
# body" from "checkServerTrusted with real validation." Flagging on the
# interface reference alone would be exactly the single weak signal
# CLAUDE.md's multi-signal rule forbids. Needs real bytecode analysis
# (opcode-level, is-this-method-body-effectively-empty), which is out of
# scope for this parser and this rule. Revisit only alongside a
# deliberate decision to add bytecode analysis capability generally, not
# as a special case carved out for this one rule.
#
# Also deliberately NOT implemented: any heuristic that infers "this app
# legitimately needs cleartext" (e.g. from its category, its permissions,
# or the shape of its domain list) to suppress a finding automatically.
# That inference is unfalsifiable from static analysis and would be a
# trivial bypass in the flagship rule of a tool whose entire value
# proposition is precision — a developer wanting to hide a real cleartext
# problem would just shape it to look legitimate. Every cleartext
# allowance this rule can see, it reports; whether it's acceptable for a
# given app is a decision for a human with product context, made
# explicit and auditable through .mobilegate.yml's
# suppress-with-mandatory-reason mechanism (spec's `ignore_rules`, not
# yet implemented — build-order step 5, baseline mode) — not a judgment
# this rule makes for them.
#
# Disposition: blocking, deliberately, despite a 5/10 corpus hit rate.
# Recorded here so this isn't relitigated off the corpus numbers alone
# later, without this context.
#
# MG-002 corpus batch 1's network-security-config-base rate (5 of 10
# apps: Fennec, Conversations, Nextcloud, AntennaPod, Material Files)
# is a property of F-Droid's app population, not evidence that the rule
# is too noisy for blocking status. Nextcloud, AntennaPod, Conversations,
# and Material Files are all "user supplies the server" apps (self-hosted
# sync, arbitrary podcast feeds, arbitrary XMPP hosts, arbitrary file
# servers) — for that category, the destination domain literally isn't
# known at build time, so a build-time cleartext denial is structurally
# impossible, and an unconditional base-config allowance is the only way
# the app can function at all for a self-hosted or non-HTTPS server.
#
# This tool's ICP (CLAUDE.md, spec) is regulated orgs shipping apps
# against their own, known, first-party backends — banking, healthcare,
# insurance, fintech. For that ICP, the app's own domains are known at
# build time by definition, and an unconditional (or first-party-domain)
# cleartext allowance is almost never a legitimate product requirement —
# it is close to always either a debug leftover, a migration that never
# got cleaned up, or a mistake. The corpus's 5/10 rate says "F-Droid
# skews toward apps in a category this rule doesn't apply cleanly to,"
# not "this rule is imprecise for the apps it's actually for."
#
# The mechanism for the F-Droid-shaped case (and for any regulated-org
# app with a genuine, reviewed exception) is .mobilegate.yml's
# suppress-with-mandatory-reason path, not a lower confidence tier or a
# narrower detector: the finding is real and should be reported every
# time cleartext is actually permitted; whether it's *acceptable* is a
# product decision a human makes once, explicitly, on the record — not
# something this rule should decide by pattern-matching the app's
# apparent category, which would reopen exactly the unfalsifiable
# legitimate-use heuristic ruled out two sections up.
