# MG-001 — Hardcoded production secret
#
# Spec: mobile-security-release-gate-build-prompt-v2.1.md, "MG-001".
#
# Multi-signal evidence model (see CLAUDE.md):
#   Signal 1 — matches a known credential pattern (this file's `patterns`).
#   Signal 2 — length-gated Shannon entropy, but ONLY for long unstructured
#              candidates (no recognizable provider prefix). Every pattern
#              below is `structured: true` — a distinctive, publicly
#              documented provider-prefix format — so for all of them the
#              prefix regex + exclusion-zone check together ARE signal 2;
#              entropy math is deliberately skipped for these, per spec.
#              `entropy.min_length` is defined here and the engine's
#              Shannon-entropy function is implemented and unit-tested
#              (internal/engine/entropy.go), but it is not yet wired to an
#              active pattern: a generic unstructured-blob detector is
#              explicitly a warning-tier concern ("ambiguous generic
#              high-entropy strings are a warning, not a block" — spec),
#              and doesn't exist yet. This field documents the intended
#              future knob, not dead config — see project notes for the
#              open question.
#   Signal 3 — not in an exclusion zone (this file's `exclusions`, plus one
#              structural exclusion that isn't a policy knob: DEX strings
#              used as a type/method/field name are never scanned, since
#              they're syntactically-constrained identifiers, not data —
#              enforced in code, not here).
#
# Pattern provenance: shapes adapted from gitleaks' default ruleset
# (https://github.com/gitleaks/gitleaks, MIT) and trufflehog's detectors
# (https://github.com/trufflesecurity/trufflehog, AGPL-3.0), cross-checked
# against each provider's own published token-format documentation.
# Re-expressed as Go RE2 regexes for this engine rather than copied
# verbatim, since the source projects target their own rule-file formats;
# the underlying prefix shapes (AKIA/ASIA, AIzaSy, sk_live_, ghp_,
# github_pat_, xox[baprs]-) are the same stable, publicly documented
# formats those projects also key off, not something invented here.
id: MG-001
name: Hardcoded production secret
severity: critical
confidence: high
platform: android
blocking: true
masvs: MASVS-STORAGE-1
cwe: CWE-798
description: >
  A credential matching a known cloud provider, SaaS, or private-key
  format was found embedded in the APK's DEX string pool, resources.arsc
  global string pool, AndroidManifest.xml's own string pool, or assets/
  directory.
remediation: >
  Remove the credential from the bundle, inject it at build time via the
  CI secret store, and rotate the exposed credential immediately.

# Scan surface — what MG-001 reads, and what it deliberately does not
# (v1 scope decisions, not silent gaps):
#
#   IN SCOPE:
#     - DEX string pool (pkg/parser/dex), Unattributed strings only.
#     - resources.arsc global string pool (pkg/parser/arsc) — covers the
#       @string/ reference form, e.g. Google Services plugin-generated
#       google_api_key/google_app_id/gcm_defaultSenderId, or
#       @string/google_maps_key per Maps SDK setup docs.
#     - AndroidManifest.xml's own string pool (pkg/parser/arsc, same
#       reader — both formats share one ResChunkHeader/ResStringPool
#       sub-format) — covers the literal form, e.g.
#       <meta-data android:value="AIzaSy…"/>, which never touches
#       resources.arsc since it isn't routed through a @string/
#       reference.
#     - assets/** file contents (pkg/parser/apk), except binary/media
#       extensions in `exclusions.path_extensions`.
#
#   OUT OF SCOPE for v1: lib/*.so (native/NDK libraries).
#     Developers do embed keys in native code on the (mistaken) belief
#     that it's harder to extract than a Java/Kotlin string constant —
#     it isn't, `strings lib/arm64-v8a/libfoo.so` finds the same literal
#     bytes just as easily. This is a real, known gap, not an oversight:
#     .so is ELF, not an Android chunk format, and needs its own reader
#     (ELF section parsing to find .rodata / .data, then the same
#     pattern-matching signals) — that's new parser surface, not reuse
#     of pkg/parser/arsc or pkg/parser/dex, and hasn't been built yet.
#     Revisit once the current scan surface has proven itself; do not
#     let this drift into being forgotten as anything other than a
#     deliberate, temporary v1 boundary.

patterns:
  - id: aws-access-key-id
    name: AWS Access Key ID
    provider: AWS
    regex: '\b(AKIA|ASIA)[0-9A-Z]{16}\b'
    structured: true
    confidence: high

  - id: gcp-firebase-api-key
    name: GCP / Firebase API key
    provider: Google Cloud / Firebase
    regex: '\bAIzaSy[0-9A-Za-z_\-]{33}\b'
    structured: true
    confidence: high

  - id: stripe-live-secret-key
    name: Stripe live secret key
    provider: Stripe
    # Deliberately sk_live_ only, never sk_test_ or pk_*: test keys and
    # publishable keys are excluded by construction (wrong prefix), not
    # by a denylist — see testdata negative fixtures.
    regex: '\bsk_live_[0-9A-Za-z]{24,}\b'
    structured: true
    confidence: high

  - id: github-pat-classic
    name: GitHub personal access token (classic)
    provider: GitHub
    regex: '\bghp_[0-9A-Za-z]{36}\b'
    structured: true
    confidence: high

  - id: github-pat-fine-grained
    name: GitHub personal access token (fine-grained)
    provider: GitHub
    regex: '\bgithub_pat_[0-9A-Za-z_]{20,}\b'
    structured: true
    confidence: high

  - id: slack-token
    name: Slack token
    provider: Slack
    regex: '\bxox[baprs]-[0-9A-Za-z-]{10,72}\b'
    structured: true
    confidence: high

  - id: private-key-header
    name: Private key block header
    provider: generic (PEM)
    regex: '-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
    structured: true
    confidence: high

entropy:
  min_length: 16
  # See header comment: defined, implemented, unit-tested; not wired to
  # an active pattern in this rule yet.

exclusions:
  # Binary/media asset files: never scanned, by extension, before any
  # regex or entropy check runs — not "matched then discarded."
  path_extensions:
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .webp
    - .bmp
    - .ico
    - .svg
    - .ttf
    - .otf
    - .woff
    - .woff2
    - .mp3
    - .mp4
    - .ogg
    - .wav
    - .zip
    - .gz

  # A candidate that structurally matches a pattern above but is an
  # obvious documented placeholder/example, not a real secret.
  value_patterns:
    - '(?i)your[_-]?api[_-]?key'
    - '(?i)(example|placeholder|changeme|dummy|xxxxx)'
