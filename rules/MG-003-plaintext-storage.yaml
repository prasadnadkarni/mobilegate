# MG-003 — Plaintext sensitive storage (backup-exposure scope)
#
# Spec: mobile-security-release-gate-build-prompt-v2.1.md, "MG-003".
#
# Scoped to android:allowBackup only. This is narrower than the spec's
# literal MG-003 text, which also names MODE_WORLD_READABLE/
# MODE_WORLD_WRITEABLE (integer constants passed to openFileOutput/
# getSharedPreferences at call sites), unscoped external-storage writes,
# and storage-API encryption configuration. All three require reading DEX
# method bodies — this parser is deliberately string-pool-only (CLAUDE.md:
# no decompilation to Smali, no bytecode/opcode analysis) — the same wall
# MG-002 hit with a custom TrustManager's checkServerTrusted body. There is
# no string-pool-only way to see which integer constant a call site passed
# or what a method actually wrote, so none of those three ship in v1.
# Content-based inference ("this looks like a token going into
# SharedPreferences") is explicitly out of scope for the same reason
# CLAUDE.md rules it out generally: it's a content guess, not a
# configuration fact, and belongs at most in a future warning-tier rule —
# never blocking.
#
# What's left, and what this rule actually is: android:allowBackup is a
# manifest attribute, deterministic, and a real finding — when backup is
# enabled with no scoping, the app's private data directory is fully
# extractable via `adb backup` (subject to the targetSdk gate below) or
# cloud backup, with no code path required at all. debuggable and
# testOnly were also manifest-level and reachable, but are NOT in this
# rule — see rules/MG-010-debug-build-artifact.yaml: different threat
# model (build-artifact hygiene, not storage exposure) and a different
# remediation owner, so bundling them here would muddy the gate-category
# framing.
id: MG-003
name: Plaintext sensitive storage (backup exposure)
severity: high
confidence: high
platform: android
blocking: true
masvs: MASVS-STORAGE-2
cwe: CWE-530
description: >
  The app's private data directory is extractable via backup (adb
  backup/restore, and/or cloud auto-backup) with no scoping in place:
  android:allowBackup is explicitly true, or absent (which defaults to
  true on every Android version) with no fullBackupContent/
  dataExtractionRules override and no custom backupAgent.
remediation: >
  Set android:allowBackup="false" on <application> unless backup is a
  genuine product requirement. If it is, scope it: reference an
  android:fullBackupContent (legacy) or android:dataExtractionRules (API
  31+) XML resource that excludes sensitive files/shared-prefs keys, or
  supply a custom android:backupAgent that implements that exclusion in
  code. This tool checks that a referenced scoping file actually
  restricts something, but does not judge whether the specific
  paths/domains excluded are the right ones for your app's data —
  verify that yourself before relying on it.

# Signals (see CLAUDE.md multi-signal model). Three subtypes
# (internal/engine's SignalAllowBackupExplicit /
# SignalAllowBackupImplicitBlock / SignalAllowBackupImplicitWarn), not
# two — an explicit value and an implicit platform default both end in
# the same effective exposure, but are reported distinctly because the
# underlying manifest fact differs:
#
#   1. allow-backup-explicit: android:allowBackup="true" is present on
#      <application>. This is NOT necessarily a deliberate opt-in —
#      android:allowBackup="true" is the value Android Studio's own
#      new-project manifest template ships, so an explicit true is, in
#      practice, at least as often an untouched IDE default as it is a
#      considered decision. The finding text does not claim otherwise.
#      Fires, and blocks, at every targetSdkVersion: the API-31
#      adb-backup narrowing (see signal 3) is a real platform behavior
#      that does apply here too — cloud/device-to-device backup remains
#      the residual risk at targetSdk >= 31, same as for the implicit
#      case, and the finding TEXT says so (see
#      internal/engine.explicitAllowBackupDetail, which selects wording
#      by targetSdk the same way the implicit signals below do). What
#      does NOT change with targetSdk is the *blocking* tier for this
#      signal specifically: the underlying fact (the attribute is
#      written down as true, in this build and every future one until
#      someone edits the line) is more certain and more durable than an
#      inherited platform default, which is the actual basis for treating
#      it more strictly than signal 3 — not developer intent.
#
#   2. allow-backup-implicit-low-target-sdk: android:allowBackup is
#      absent (defaults to true — unlike usesCleartextTraffic, this
#      default has never changed across Android versions) AND
#      targetSdkVersion < 31. Below API 31, `adb backup` extracts app
#      data unconditionally for any backup-eligible app, debuggable or
#      not — so an unconsidered default is just as exposed as an
#      explicit true for these apps. Blocking.
#
#   3. allow-backup-implicit-narrowed-by-target-sdk:
#      android:allowBackup is absent AND targetSdkVersion >= 31. From API
#      31 (Android 12), `adb backup`/`adb restore` excludes app data
#      unless the app is also debuggable — closing the primary
#      local-extraction path for a non-debuggable release build on a
#      modern target. Cloud backup and device-to-device transfer can
#      still apply, so the exposure is narrowed, not eliminated: reported
#      as a warning, not a block — this signal stacks two lower-certainty
#      conditions (nothing was written down, AND the specific path that
#      made the low-targetSdk case unconditionally blocking is closed),
#      which is what actually justifies the lighter disposition, not any
#      claim that the app "meant it" less than an explicit true would
#      have. See minADBBackupRestrictedSDK in internal/engine/storage.go.
#
# Corpus note (12-app batch): every app in the corpus has an EXPLICIT
# allowBackup value (true or false) — zero rely on the implicit default,
# so signals 2 and 3 above are fixture-tested but currently unexercised
# by this tool's real-world corpus. Consistent with the IDE-template
# theory above: allowBackup is one of the first lines a template writes,
# so "never touched" in practice usually still means "explicit," not
# "absent."
#
# Override suppression (internal/engine/storage.go). Two tiers:
#
#   Free overrides (no file I/O — hasFreeBackupOverride): android:
#   fullBackupContent set to the literal "false" (backup affirmatively
#   disabled — NOT "true", which Android treats as equivalent to the
#   unscoped default, not a real restriction), or a custom
#   android:backupAgent class. A custom agent's actual behavior would
#   need DEX method-body/bytecode analysis to verify — the same
#   permanently-out-of-scope wall as MG-002's TrustManager gap — so its
#   mere presence is still blindly trusted.
#
#   Resource-reference overrides (checked, not blindly trusted —
#   pkg/parser/backuprules): if android:fullBackupContent or
#   android:dataExtractionRules references an XML resource, this rule
#   reads and parses that file (both formats express every fact as
#   element attributes, not CDATA text, so this reuses androidbinary's
#   struct-tag XML decode directly — the same mechanism
#   pkg/parser/manifest already uses, unlike network_security_config.xml,
#   which needed a custom CDATA-aware tree walker) and suppresses only if
#   the file expresses a real structural restriction: an <exclude>
#   element anywhere, an <include requireFlags="..."> (legacy
#   fullBackupContent only — checked against
#   developer.android.com/guide/topics/data/autobackup, since
#   requireFlags is a documented restriction mechanism distinct from
#   <exclude>), or disableIfNoEncryptionCapabilities="true" on
#   <cloud-backup> (dataExtractionRules only). This still does NOT judge
#   whether the specific paths/domains excluded are the right ones —
#   that sufficiency judgment stays out of scope, same as the free-
#   override tier — only whether the file restricts SOMETHING at all.
#   An include-only or genuinely empty file does not suppress. Neither
#   does a file this tool could not find, read, or parse — fail closed:
#   an unresolvable override is not evidence of anything.
#
#   Known precedence gap, not modeled: on API 31+ devices the platform
#   honors dataExtractionRules and ignores fullBackupContent entirely if
#   both are set. This rule checks both (OR) rather than modeling that
#   precedence, which stays conservative — it can suppress on a
#   fullBackupContent file the platform wouldn't actually consult on a
#   modern device, but never fails to suppress on the file that IS
#   honored.
#
# This was a real, not hypothetical, precision gap: the "any <exclude>"
# framing considered first would have false-positived on Conversations
# (corpus), whose fullBackupContent/dataExtractionRules files restrict
# backup ENTIRELY through requireFlags="clientSideEncryption" and
# disableIfNoEncryptionCapabilities="true" — zero <exclude> elements in
# either file — deliberately conditioning backup on device-side
# encryption support, which is good engineering, not an unscoped
# override. Caught by inspecting real corpus file content (via aapt2)
# before shipping the narrower rule, not by an abstract review.
#
# Corpus result after building this check (12-app batch): unchanged from
# before it existed — still 3 blocking findings (Simple Flashlight,
# Material Files, NewPipe), all with no override reference at all. Of
# the 5 apps (42%) that DO suppress via a resource-reference override
# (KeePassDX, Conversations, Dolphin, VLC — plus AntennaPod via the free
# backupAgent tier, unaffected by this check), every referenced file
# that was actually inspected turned out to contain a real restriction —
# no false suppression found in this corpus. That the coincidentally
# shared filename "res/Qq.xml" across KeePassDX/Dolphin/VLC (a resource-
# shrinker artifact, confirmed by raw-byte diff to NOT be the same file
# despite the name) turned out to be three substantively different,
# genuinely-scoped files reinforced the same lesson as the Conversations
# case: don't assume from a coincidence, check the content.
# NOT implemented (v1 scope decision, same disposition as the bytecode
# gaps documented in MG-001/MG-002's YAMLs):
#   - MODE_WORLD_READABLE / MODE_WORLD_WRITEABLE at openFileOutput/
#     getSharedPreferences call sites — requires DEX method-body analysis.
#   - Unscoped external-storage writes (getExternalStorageDirectory,
#     unscoped MediaStore writes) — same wall, plus the platform's own
#     scoped-storage enforcement (API 29+) already narrows this
#     considerably at runtime, further reducing the value of a
#     string-pool-only heuristic here.
#   - Storage-API encryption configuration (EncryptedSharedPreferences,
#     SQLCipher, Jetpack Security usage or absence thereof) — presence of
#     a class reference is not evidence of correct use, and absence is
#     not evidence of a problem (plenty of legitimate apps store nothing
#     sensitive at rest). Same content-inference trap CLAUDE.md rules out
#     generally.
# Revisit only alongside a deliberate decision to add DEX bytecode
# analysis capability generally — not as a one-off carve-out for this
# rule, per the same discipline applied to MG-002's TrustManager gap.
