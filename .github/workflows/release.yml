name: Release

# Triggered by pushing a version tag (v0.1.0, v0.2.0, ...). Cross-
# compiles, checksums, and attaches binaries to a GitHub release via
# goreleaser (.goreleaser.yml) — this is what lets action.yml fetch a
# pinned version instead of requiring a Go toolchain on every
# consumer's runner. Also publishes a Homebrew formula
# (prasadnadkarni/homebrew-tap) and a multi-arch Docker image
# (ghcr.io/prasadnadkarni/mobilegate) via the same goreleaser run — see
# .goreleaser.yml's brews:/dockers: blocks.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # goreleaser needs this to create the GitHub release and upload assets
  packages: write # goreleaser needs this to push the Docker image to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser needs full history to generate the changelog between tags

      # A stale `prasadnadkarni/mobilegate@vX.Y.Z` pin in README.md or
      # CONTRIBUTING.md has slipped through three times: it's
      # hand-written prose, not generated from the tag, so nothing else
      # in this pipeline notices when it's wrong — the release still
      # succeeds, CI still passes, and it just quietly hands new
      # adopters an older action version than the one being documented
      # right below it. This fails the release outright instead, before
      # goreleaser does anything, rather than relying on remembering to
      # grep first (see CONTRIBUTING.md's "Cutting a release").
      - name: Verify README/CONTRIBUTING action pins match this tag
        run: |
          tag="${{ github.ref_name }}"
          found_any=0
          mismatches=""

          for f in README.md CONTRIBUTING.md; do
            refs=$(grep -oE 'prasadnadkarni/mobilegate@v[0-9]+\.[0-9]+\.[0-9]+' "$f" | sort -u || true)
            for ref in $refs; do
              found_any=1
              ref_version="${ref##*@}"
              if [ "$ref_version" != "$tag" ]; then
                mismatches="${mismatches}
            $f: $ref (expected @$tag)"
              fi
            done
          done

          # Belt and braces: if the reference pattern itself ever breaks
          # (e.g. the format changes and this regex stops matching), fail
          # loudly rather than silently passing with zero checks done.
          if [ "$found_any" -eq 0 ]; then
            echo "::error::found zero 'prasadnadkarni/mobilegate@v...' references in README.md/CONTRIBUTING.md — the check pattern itself may be broken, not just the pins. Fix the check before trusting it."
            exit 1
          fi

          if [ -n "$mismatches" ]; then
            echo "::error::stale action version pin(s) — bump these to @$tag before tagging a release:$mismatches"
            exit 1
          fi

          echo "All action pins in README.md/CONTRIBUTING.md match $tag"

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # QEMU + buildx: this runner is amd64-only, but goreleaser's
      # dockers: block builds an arm64 image too (via buildx, using
      # QEMU emulation for the non-native arch) — both steps are
      # required before goreleaser's docker build can succeed for
      # anything but the runner's own native arch.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Separate token, NOT GITHUB_TOKEN: this run needs write
          # access to prasadnadkarni/homebrew-tap, a different repo,
          # which the default GITHUB_TOKEN cannot reach regardless of
          # the permissions: block above (those only ever grant access
          # to THIS repo). See the README/this repo's own setup notes
          # for exactly what to create — a fine-grained PAT scoped to
          # homebrew-tap, stored as a secret named exactly this.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
